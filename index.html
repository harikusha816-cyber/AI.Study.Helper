<!DOCTYPE html>
<html>
<head>
  <title>AI Study Helper</title>
</head>

<body style="background:#0f172a; color:white; text-align:center; padding-top:100px;">

  <h1>AI Study Helper</h1>
  <p>Study smarter with AI</p>

  <input id="question" placeholder="Ask anything..." style="padding:10px; width:250px;">
  <br><br>

  <button onclick="askAI()" style="padding:10px 20px;">Ask AI</button>

  <div id="output" style="margin-top:20px;"></div>

  <script>
    function askAI() {
      let q = document.getElementById("question").value;

      if(q.trim() === "") {
        document.getElementById("output").innerText = "⚠️ Please ask a question first!";
        return;
      }

      document.getElementById("output").innerText =
        "AI Answer: " + q + " is an important question. Here is a simple explanation...";
    }
  </script>

</body>
</html>
